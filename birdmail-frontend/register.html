<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birdmail - Registro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center h-screen font-sans antialiased text-slate-800">

    <div class="w-full max-w-md p-8 bg-white border border-slate-200 rounded-xl shadow-sm">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold tracking-tight text-slate-900 flex items-center justify-center gap-2">
                🐦 Birdmail
            </h1>
            <p class="text-sm text-slate-500 mt-2">Crea tu cuenta</p>
        </div>

        <form id="registerForm" class="space-y-5">
            <div>
                <label for="nombre" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" required
                    class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-slate-400 focus:bg-white transition-colors"
                    placeholder="Juan Pérez">
            </div>

            <div>
                <label for="email" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Dirección de Correo</label>
                <div class="flex">
                    <input type="text" id="email" name="email" required
                        class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-l-lg text-sm focus:outline-none focus:border-slate-400 focus:bg-white transition-colors"
                        placeholder="usuario">
                    <span class="inline-flex items-center px-3 bg-slate-100 border border-l-0 border-slate-200 rounded-r-lg text-sm text-slate-500 font-medium">
                        @birdmail.com
                    </span>
                </div>
            </div>

            <div>
                <label for="password" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Contraseña</label>
                <input type="password" id="password" name="password" required
                    class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-slate-400 focus:bg-white transition-colors"
                    placeholder="••••••••">
            </div>

            <button type="submit"
                class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-2.5 px-4 rounded-lg text-sm transition-colors cursor-pointer mt-2">
                Registrarse
            </button>
        </form>

        <div class="text-center mt-6 pt-5 border-t border-slate-100 text-sm">
            <span class="text-slate-500">¿Ya tienes una cuenta?</span>
            <a href="login.html" class="text-slate-900 font-semibold hover:underline ml-1">Inicia sesión</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nombre = document.getElementById('nombre').value;
            const usuario = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const emailCompleto = usuario + '@birdmail.com';

            console.log("=== Datos capturados para tu primera prueba ===");
            console.log("Nombre:", nombre);
            console.log("Email final:", emailCompleto);
            console.log("Password:", password);

            alert(`¡Prueba exitosa en Frontend!\nUsuario capturado: ${emailCompleto}\n\nEn los próximos pasos conectaremos esto con Spring Boot.`);
        });
    </script>
</body>
</html>
