<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birdmail - inbox </title> 
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900 antialiased">

    <div class="flex h-screen overflow-hidden">
        
        <div class="w-64 bg-white border-r border-gray-200 flex flex-col justify-between">
            <div class="p-5">
                <div class="flex items-center space-x-2 text-blue-600 font-bold text-xl tracking-wider mb-6">
                    <span>🐦</span>
                    <span>Birdmail User Profile</span>
                </div>

                <!-- MENU LATERAL -->
                <nav class="space-y-1">
                    <a id="inbox-btn" href="dashboard.html" class="flex items-center space-x-3 bg-blue-50 text-blue-700 font-medium py-2 px-3 rounded-lg text-sm">
                        <span>📥</span>
                        <span>Inbox</span>
                    </nav>
                    <a href="#" class="flex items-center space-x-3 text-gray-600 hover:bg-gray-100 py-2 px-3 rounded-lg text-sm transition">
                        <span>🚀</span>
                        <span>Sent</span>
                    </a>
                    <a href="#" class="flex items-center space-x-3 text-gray-600 hover:bg-gray-100 py-2 px-3 rounded-lg text-sm transition">
                        <span>📝</span>
                        <span>Draft</span>
                    </a>
                    <a id="profile-btn" href="#" class="flex items-center space-x-3 text-gray-600 hover:bg-gray-100 py-2 px-3 rounded-lg text-sm transition">
                        <span>👤</span>
                        <span>Profile</span>
                    </a>
                </nav>
            </div>
            
            <div class="p-4 border-t border-gray-200 bg-gray-50 flex items-center justify-between text-sm">
                <span id= "logged-user-email" class="font-medium text-gray-700 truncate"></span>
                <a href="#" class="text-red-500 hover:text-red-700 font-semibold text-xs">Logout</a>
            </div>
        </div>
        <!---->

        <div class="flex-1 flex flex-col min-w-0 bg-white">

            <!-- User info -->
            <div class="flex-1 overflow-y-auto divide-y divide-gray-100">
                <div class="p-4 hover:bg-gray-50 cursor-pointer flex items-start space-x-4 transition bg-blue-50/40">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-sm font-semibold text-gray-900">Email</span>
                        </div>
                        <p id="email" class="text-xs text-gray-500 truncate mt-0.5"></p>
                    </div>
                </div>

                <div class="p-4 hover:bg-gray-50 cursor-pointer flex items-start space-x-4 transition">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-sm font-medium text-gray-700">Name</span>
                        </div>
                        <p class="text-xs text-gray-400 truncate mt-0.5">User first and last name...</p>
                    </div>
                </div>

                <div class="p-4 hover:bg-gray-50 cursor-pointer flex items-start space-x-4 transition">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-sm font-medium text-gray-700">
                                <a id="profile-btn" href="edit_user.html" class="flex items-center space-x-3 text-gray-600 hover:bg-gray-100 py-2 px-3 rounded-lg text-sm transition">
                                    <span>⚙️</span>
                                    <span>Edit</span>
                                </a>
                            </span>
                </div>

            </div>
        </div>

    </div>

    <script src="js/profile.js"></script>

</body>
</html>
